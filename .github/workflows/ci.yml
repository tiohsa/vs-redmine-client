name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm run compile-tests && pnpm run compile && xvfb-run -a pnpm exec vscode-test
        env:
          ELECTRON_DISABLE_SANDBOX: '1'
          ELECTRON_NO_SANDBOX: '1'
          VSCODE_TEST_ELECTRON_ARGS: '--no-sandbox --disable-setuid-sandbox'
